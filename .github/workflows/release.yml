name: Release

# Fire only after CI finishes on main. Combined with the success guard below,
# a red CI (fmt/clippy/build/test failure) means the release never runs.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

# A release per commit must not clobber an in-flight one; let each run finish.
concurrency:
  group: release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate the release on the full suite, including the #[ignore]d network
  # integration tests that hit CCP's SDE redirect (skipped in plain `cargo test`).
  # The `if` also gates the whole pipeline on CI success: a push to main whose CI
  # run failed, was cancelled, or wasn't a push event skips this job, and the
  # downstream `needs:` chain skips build + release with it.
  test:
    name: tests (incl. network)
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Rust toolchain
        # Pinned by SHA, so name the toolchain channel explicitly.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Test (including ignored network tests)
        run: cargo test -- --include-ignored

  build:
    name: build ${{ matrix.target }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin: eve-sde-mcp
          - target: aarch64-apple-darwin
            os: macos-latest
            bin: eve-sde-mcp
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: eve-sde-mcp.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Rust toolchain
        # Pinned by SHA, so name the toolchain channel explicitly.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}
          if-no-files-found: error

  release:
    name: package & release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download built binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      # The manifest's platform_overrides expect each binary at a triple-named
      # path under server/ (see #16 / #14). Reconstruct that layout for `mcpb pack`.
      - name: Assemble server/ bundle layout
        run: |
          set -euo pipefail
          mkdir -p server/x86_64-unknown-linux-gnu \
                   server/aarch64-apple-darwin \
                   server/x86_64-pc-windows-msvc
          cp artifacts/binary-x86_64-unknown-linux-gnu/eve-sde-mcp server/x86_64-unknown-linux-gnu/eve-sde-mcp
          cp artifacts/binary-aarch64-apple-darwin/eve-sde-mcp     server/aarch64-apple-darwin/eve-sde-mcp
          cp artifacts/binary-x86_64-pc-windows-msvc/eve-sde-mcp.exe server/x86_64-pc-windows-msvc/eve-sde-mcp.exe
          chmod +x server/x86_64-unknown-linux-gnu/eve-sde-mcp \
                   server/aarch64-apple-darwin/eve-sde-mcp

      - name: Install mcpb CLI
        run: |
          set -euo pipefail
          if ! command -v mcpb >/dev/null 2>&1; then
            npm install -g @anthropic-ai/mcpb
          fi
          mcpb --version

      - name: Pack MCPB bundle
        run: mcpb pack . eve-sde-mcp.mcpb

      - name: Stage release binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          cp server/x86_64-unknown-linux-gnu/eve-sde-mcp dist/eve-sde-mcp-x86_64-unknown-linux-gnu
          cp server/aarch64-apple-darwin/eve-sde-mcp     dist/eve-sde-mcp-aarch64-apple-darwin
          cp server/x86_64-pc-windows-msvc/eve-sde-mcp.exe dist/eve-sde-mcp-x86_64-pc-windows-msvc.exe

      - name: Compute release tag
        id: tag
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          # HEAD is the CI-passing commit (checked out via workflow_run.head_sha);
          # tag with its short SHA so each release maps to an exact commit.
          short_sha=$(git rev-parse --short HEAD)
          echo "tag=v${version}+${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          generate_release_notes: true
          files: |
            eve-sde-mcp.mcpb
            dist/eve-sde-mcp-x86_64-unknown-linux-gnu
            dist/eve-sde-mcp-aarch64-apple-darwin
            dist/eve-sde-mcp-x86_64-pc-windows-msvc.exe
